<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Profile | StudyShare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">StudyShare</a>
        <div class="nav-links">
            <a href="browse.html">Browse Notes</a>
            <a href="upload.html">Upload</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <main class="profile-container">
        <div class="user-header">
            <div class="user-avatar">
                <div class="avatar">AIN</div>
            </div>
            <div class="user-info">
                <h2>Md. Ahidul Islam Nahid</h2>
                <p>Daffodil International University</p>
                <p class="member-since">Member since Jan 2023</p>
            </div>
        </div>

        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-value">12</div>
                <div class="stat-label">Notes Uploaded</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">৳9550</div>
                <div class="stat-label">Total Earnings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">4.6★</div>
                <div class="stat-label">Avg. Rating</div>
            </div>
        </div>

        <div class="user-notes">
            <div class="section-header">
                <h3>Your Uploads</h3>
                <a href="upload.html" class="btn-primary">+ Upload New</a>
            </div>
            
            <div class="note-list">
                <div class="note-item">
                    <div class="note-preview">Bio</div>
                    <div class="note-details">
                        <h4>Biology 101 Notes</h4>
                        <p>10 sales • ৳4000 earned</p>
                    </div>
                    <div class="note-actions">
                        <button class="btn-icon">✏️</button>
                        <button class="btn-icon btn-danger">🗑️</button>
                    </div>
                </div>
                <!-- More note items -->
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
