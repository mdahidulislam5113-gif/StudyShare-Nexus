<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Notes | StudyShare</title>
    <link rel="stylesheet" href="css\style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">StudyShare</a>
        <div class="nav-links">
            <a href="browse.html">Browse Notes</a>
            <a href="upload.html">Upload</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <main class="upload-container">
        <div class="upload-header">
            <h1>Upload New Notes</h1>
            <p>Sell your study materials to help other students</p>
        </div>
        
        <form class="upload-form">
            <div class="form-group">
                <label>Note Title</label>
                <input type="text" placeholder="Biology 101 - Midterm Notes">
            </div>
            
            <div class="form-group">
                <label>Course</label>
                <input type="text" placeholder="Biology 101">
            </div>
            
            <div class="form-group">
                <label>Professor</label>
                <input type="text" placeholder="Kamily Zaman">
            </div>
            
            <div class="form-group">
                <label>Upload PDF</label>
                <div class="upload-preview">
                    <div class="preview-placeholder">
                        <div class="upload-icon">📤</div>
                        <p>Drag & drop or <span>browse files</span></p>
                        <small>PDF/DOCX up to 10MB</small>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Set Price (৳)</label>
                <input type="number" min="1" step="0.5" value="250">
            </div>
            
            <div class="form-group">
                <label class="agreement-checkbox">
                    <input type="checkbox" required>
                    <span class="checkmark"></span>
                    I confirm these are my original notes
                </label>
            </div>
            
            <div class="pricing-tips">
                <h4>Pricing Suggestions:</h4>
                <ul>
                    <li><strong>Summaries:</strong> ৳100-৳150</li>
                    <li><strong>Full Lecture Notes:</strong> ৳400-৳1000</li>
                    <li><strong>Exam Prep Kits:</strong> ৳200-৳300</li>
                </ul>
            </div>
            
            <button type="submit" class="btn-primary">Publish Notes</button>
        </form>
    </main>
    <script src="main.js"></script>
</body>
</html>
